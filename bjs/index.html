<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Lookup & Download</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .autocomplete-list.active {
            display: block;
        }

        .autocomplete-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background-color: #f5f5f5;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item strong {
            color: #667eea;
        }

        .result-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            font-weight: 600;
            color: #555;
            min-width: 100px;
        }

        .result-value {
            color: #333;
            text-align: right;
            flex: 1;
        }

        .download-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 15px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .result-row {
                flex-direction: column;
            }

            .result-value {
                text-align: left;
                margin-top: 5px;
            }
        }
    </style>
</head>

        async function loadData() {
            try {
                const response = await fetch('data.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Failed to load data.json: ${response.status} ${response.statusText}`);
                }
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error('data.json must contain a non-empty array of records');
                }
                allData = data;
                return;
            } catch (error) {
                loadError = `Unable to load data.json: ${error.message}`;
                showError(loadError);
                console.error(loadError, error);
                allData = [];
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            setupEventListeners();
        });

        function setupEventListeners() {
            const input = document.getElementById('nameInput');
            const autocompleteList = document.getElementById('autocompleteList');

            input.addEventListener('input', (e) => {
                if (loadError) {
                    showError(loadError);
                    autocompleteList.classList.remove('active');
                    return;
                }

                const value = e.target.value.trim().toLowerCase();
                clearError();

                if (value.length === 0) {
                    autocompleteList.classList.remove('active');
                    return;
                }

                const matches = allData.filter(item =>
                    item.name.toLowerCase().includes(value)
                );

                displayAutocomplete(matches, value);
            });

            input.addEventListener('keydown', (e) => {
                const items = autocompleteList.querySelectorAll('.autocomplete-item');
                let currentIndex = Array.from(items).findIndex(item => item.classList.contains('selected'));

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (!autocompleteList.classList.contains('active')) {
                        autocompleteList.classList.add('active');
                        return;
                    }
                    currentIndex = (currentIndex + 1) % items.length;
                    updateSelectedIndex(items, currentIndex);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (currentIndex === -1) return;
                    currentIndex = (currentIndex - 1 + items.length) % items.length;
                    updateSelectedIndex(items, currentIndex);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (currentIndex !== -1) {
                        selectItem(items[currentIndex].dataset.index);
                    }
                }
            });

            input.addEventListener('focus', () => {
                if (loadError) {
                    showError(loadError);
                    return;
                }

                if (input.value.trim().length > 0) {
                    const value = input.value.trim().toLowerCase();
                    const matches = allData.filter(item =>
                        item.name.toLowerCase().includes(value)
                    );
                    if (matches.length > 0) {
                        displayAutocomplete(matches, value);
                    }
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.input-wrapper')) {
                    autocompleteList.classList.remove('active');
                }
            });
        }

        function displayAutocomplete(matches, searchValue) {
            const autocompleteList = document.getElementById('autocompleteList');

            if (matches.length === 0) {
                autocompleteList.innerHTML = '<div class="no-results">No matches found</div>';
                autocompleteList.classList.add('active');
                return;
            }

            autocompleteList.innerHTML = matches.map((item, index) => {
                const highlighted = item.name.replace(
                    new RegExp(`(${searchValue})`, 'gi'),
                    '<strong>$1</strong>'
                );
                return `
                    <li class="autocomplete-item" data-index="${index}" onclick="selectItem(${index})">
                        ${highlighted}
                        <br>
                        <small style="color: #999; font-size: 12px;">${item.code} • ${item.std ? 'Class ' + item.std : 'N/A'}</small>
                    </li>
                `;
            }).join('');

            autocompleteList.classList.add('active');
        }

        function updateSelectedIndex(items, index) {
            items.forEach(item => item.classList.remove('selected'));
            if (items[index]) {
                items[index].classList.add('selected');
                items[index].scrollIntoView({ block: 'nearest' });
            }
        }

        function selectItem(index) {
            const filtered = allData.filter(item =>
                item.name.toLowerCase().includes(document.getElementById('nameInput').value.trim().toLowerCase())
            );

            if (filtered[index]) {
                selectedRecord = filtered[index];
                document.getElementById('nameInput').value = selectedRecord.name;
                document.getElementById('autocompleteList').classList.remove('active');
                displayResult(selectedRecord);
                clearError();
            }
        }

        function displayResult(record) {
            document.getElementById('codeDisplay').textContent = record.code;
            document.getElementById('nameDisplay').textContent = record.name;
            document.getElementById('stdDisplay').textContent = record.std || 'N/A';
            document.getElementById('schoolDisplay').textContent = record.school || 'N/A';
            document.getElementById('resultSection').classList.add('show');
        }

        async function downloadCertificate() {
            if (!selectedRecord) {
                showError('Please select a name first!');
                return;
            }

            const btn = document.getElementById('downloadBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Downloading...';

            try {
                const certPath = `certs/${selectedRecord.code}.jpg`;
                const response = await fetch(certPath);
                
                if (!response.ok) {
                    throw new Error('Certificate not found');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${selectedRecord.code}_${selectedRecord.name.replace(/\s+/g, '_')}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Download error:', error);
                showError('Failed to download certificate. Please check if the file exists in the certs folder.');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }
    </script>
